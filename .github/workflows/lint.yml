name: Code Quality
on:
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Using the 2026 LTS version
          cache: 'npm'
      - run: npm ci
      - run: npm run lint